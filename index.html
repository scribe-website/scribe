<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scribe</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-900 to-blue-400 text-white font-sans">

<!-- Navbar -->
<nav class="flex justify-between items-center p-6">
  <h1 class="text-2xl font-bold">Scribe</h1>
  <div>
    <button onclick="login()" class="px-4 py-2 bg-white text-blue-600 rounded-lg">Login</button>
    <button onclick="signup()" class="px-4 py-2 bg-blue-600 rounded-lg">Sign Up</button>
  </div>
</nav>

<!-- Hero -->
<section class="h-screen flex flex-col justify-center items-center text-center">
  <h2 class="text-5xl font-bold mb-4">Find Help. Earn Smart.</h2>
  <p class="text-lg mb-6">Connect with students. Share work. Grow together.</p>
</section>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBZgmeqA0OxYmZdclVo3ZyXNp5lPdRqjS4",
  authDomain: "scribe-ca762.firebaseapp.com",
  projectId: "scribe-ca762",
  storageBucket: "scribe-ca762.firebasestorage.app",
  messagingSenderId: "384222584586",
  appId: "1:384222584586:web:e92445bd7dc57df665e4f3"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function signup() {
  const email = prompt("Enter email:");
  const password = prompt("Enter password");

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => alert("Account created"))
    .catch(err => alert(err.message));
}

function login() {
  const email = prompt("Enter email:");
  const password = prompt("Enter password");

  auth.signInWithEmailAndPassword(email, password)
    .then(() => alert("Logged in"))
    .catch(err => alert(err.message));
}
</script>

</body>
</html>
